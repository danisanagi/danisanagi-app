<head>

<meta name="generator" content="Perplexity Computer">
<meta name="author" content="Perplexity Computer">
<meta property="og:see_also" content="https://www.perplexity.ai/computer">
<link rel="author" href="https://www.perplexity.ai/computer">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danışan Ağı — Yönetim Paneli</title>
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <img src="./assets/logo.png" alt="Danışan Ağı Logo" class="logo">
    <h1>Hoş Geldiniz</h1>
    <p class="subtitle">Devam etmek için giriş yapın</p>
    <div class="form-group">
      <label for="loginEmail">E-posta</label>
      <input type="email" id="loginEmail" class="form-input" placeholder="ornek@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="loginPassword">Şifre</label>
      <input type="password" id="loginPassword" class="form-input" placeholder="Şifrenizi girin" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="handleLogin()" style="margin-top:var(--space-4);">Giriş Yap</button>
    <p id="loginError" style="color:var(--color-error);font-size:var(--text-sm);margin-top:var(--space-3);display:none;"></p>
  </div>
</div>

<!-- ==================== APP SHELL ==================== -->
<div id="appShell" class="app-shell">
  <header class="topbar">
    <div class="topbar-left">
      <img src="./assets/logo.png" alt="Danışan Ağı" class="logo">
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar" id="topbarAvatar">A</div>
        <span id="topbarName">Admin</span>
        <span class="role-tag admin" id="topbarRole">Admin</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()" aria-label="Çıkış Yap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Çıkış
      </button>
    </div>
  </header>

  <main class="main-content" id="mainContent">
    <div class="empty-state"><div class="loading-spinner"></div><p>Yükleniyor...</p></div>
  </main>

  <footer class="app-footer">
    <p>&copy; 2026 Danışan Ağı — Tüm hakları saklıdır. | <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a></p>
  </footer>
</div>

<!-- ==================== VIDEO CALL (Jitsi) ==================== -->
<div id="videoCallScreen" class="video-call-screen">
  <div id="jitsiContainer" style="flex:1;"></div>
  <div class="video-controls" style="justify-content:center;">
    <button class="video-control-btn end-call" onclick="endVideoCall()" aria-label="Görüşmeyi Bitir">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 2.59 3.4Z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      <span style="margin-left:var(--space-2);font-size:var(--text-sm);">Görüşmeyi Bitir</span>
    </button>
  </div>
</div>

<!-- ==================== MODALS ==================== -->
<!-- Add/Edit Expert Modal -->
<div id="expertModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="expertModalTitle">Uzman Ekle</h3>
      <button class="modal-close" onclick="closeModal('expertModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>Ad Soyad</label>
      <input type="text" id="expertName" class="form-input" placeholder="Dr. Ayşe Yılmaz">
    </div>
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="expertEmail" class="form-input" placeholder="uzman@email.com">
    </div>
    <div class="form-group">
      <label>Şifre <span style="font-weight:400;color:var(--color-text-faint);" id="expertPasswordHint">(min. 6 karakter)</span></label>
      <input type="password" id="expertPassword" class="form-input" placeholder="Şifre belirleyin">
    </div>
    <div class="form-group">
      <label>Uzmanlık Alanı</label>
      <input type="text" id="expertSpecialty" class="form-input" placeholder="Klinik Psikolog">
    </div>
    <div class="form-group">
      <label>Telefon</label>
      <input type="tel" id="expertPhone" class="form-input" placeholder="0532 XXX XXXX">
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('expertModal')">İptal</button>
      <button class="btn btn-primary" id="expertSaveBtn" onclick="saveExpert()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Add/Edit Client Modal -->
<div id="clientModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="clientModalTitle">Danışan Ekle</h3>
      <button class="modal-close" onclick="closeModal('clientModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>Ad Soyad</label>
      <input type="text" id="clientName" class="form-input" placeholder="Mehmet Kaya">
    </div>
    <div class="form-group">
      <label>E-posta</label>
      <input type="email" id="clientEmail" class="form-input" placeholder="danisan@email.com">
    </div>
    <div class="form-group">
      <label>Şifre <span style="font-weight:400;color:var(--color-text-faint);" id="clientPasswordHint">(min. 6 karakter)</span></label>
      <input type="password" id="clientPassword" class="form-input" placeholder="Şifre belirleyin">
    </div>
    <div class="form-group">
      <label>Telefon</label>
      <input type="tel" id="clientPhone" class="form-input" placeholder="0533 XXX XXXX">
    </div>
    <div class="form-group">
      <label>Atanan Uzman</label>
      <select id="clientExpertSelect" class="form-input">
        <option value="">Uzman seçiniz</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('clientModal')">İptal</button>
      <button class="btn btn-primary" onclick="saveClient()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Silme Onayı</h3>
      <button class="modal-close" onclick="closeModal('confirmModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <p class="confirm-text" id="confirmMessage">Bu kaydı silmek istediğinize emin misiniz?</p>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('confirmModal')">Vazgeç</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Sil</button>
    </div>
  </div>
</div>

<!-- Assign Clients Modal -->
<div id="assignModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="assignModalTitle">Danışan Ata</h3>
      <button class="modal-close" onclick="closeModal('assignModal')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div id="assignClientsList"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('assignModal')">Kapat</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="./app.js"></script>
</body>
</html>
